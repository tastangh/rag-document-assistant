services:
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-document-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      RAG_RESULTS_DIR: /app/src/results
      RAG_RUNTIME_ROOT: /app/src/results/ui_simple_runtime
      RAG_CHUNK_ARTIFACTS_DIR: /app/src/results/chunkEmbeddings
      RAG_VECTOR_PERSIST_DIR: /app/src/results/vectorStore/chroma
      RAG_EVAL_DIR: /app/src/results/eval
      RAG_OCR_CACHE_DIR: /app/src/results/cache/paddlex
      RAG_OCR_USE_GPU: "0"
      RAG_EMBED_DEVICE: "cpu"
      RAG_RETRIEVAL_DEVICE: "cpu"
    volumes:
      - ./src/results:/app/src/results
      - ./src/data:/app/src/data
    restart: unless-stopped
