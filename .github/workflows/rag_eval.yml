name: rag-triad-eval

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/rag_eval.yml"

jobs:
  offline-triad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Build fixture from existing report if available
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          report = Path('src/results/eval/faz6_triad_report.json')
          out = Path('src/results/eval/faz6_answers_fixture.jsonl')
          out.parent.mkdir(parents=True, exist_ok=True)

          rows = []
          if report.exists():
              data = json.loads(report.read_text(encoding='utf-8'))
              for r in data.get('results', []):
                  rows.append({
                      'question': r.get('question', ''),
                      'answer': r.get('answer', ''),
                      'relevant_doc_ids': r.get('relevant_doc_ids', []),
                      'sources': r.get('sources', []),
                      'verification': r.get('verification', {}),
                  })

          if not rows:
              rows = [{
                  'question': 'fixture-sample',
                  'answer': 'Veri bulunamadı.',
                  'relevant_doc_ids': [],
                  'sources': [],
                  'verification': {'confidence': 'low', 'supported_ratio': 0.0},
              }]

          with out.open('w', encoding='utf-8') as f:
              for row in rows:
                  f.write(json.dumps(row, ensure_ascii=False) + '\n')
          print(f'fixture written: {out}')
          PY

      - name: Run offline triad gate
        run: |
          python src/faz6_eval.py \
            --answers-file src/results/eval/faz6_answers_fixture.jsonl \
            --pass-threshold 0.0 \
            --output src/results/eval/faz6_triad_report_ci.json
